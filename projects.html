<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ian Tolentino">
    <meta name="description" content="Ian Tolentino's Projects - 63+ projects including web apps, desktop applications, browser extensions, and automation tools">
    
    <title>Projects — Ian Tolentino</title>
    
    <link rel="icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="css/backend-demo.css">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        })();
    </script>
</head>
<body>
    <div id="site-header"></div>
    
    <main>
        <div class="container">
            <section class="main-card">
                <div class="projects-header">
                    <h1 class="section-title">My Projects</h1>
                    
                    <!-- Project Stats - Now with real GitHub data -->
                    <div class="project-stats">
                        <div class="project-stat-item">
                            <span class="project-stat-number">164</span>
                            <span class="project-stat-label">
                                <i class="fas fa-star"></i> Stars
                            </span>
                        </div>
                        <div class="project-stat-item">
                            <span class="project-stat-number">5</span>
                            <span class="project-stat-label">
                                <i class="fas fa-code-branch"></i> Forks
                            </span>
                        </div>
                        <div class="project-stat-item">
                            <span class="project-stat-number">1.3k</span>
                            <span class="project-stat-label">
                                <i class="fas fa-code-commit"></i> Contributions
                            </span>
                        </div>
                    </div>
                </div>

<!-- Filter Section -->
<div class="filter-section">
    <!-- Desktop Filters -->
    <div class="project-filters" id="desktopFilters">
        <button class="filter-btn active" data-filter="all">
            <i class="fas fa-layer-group"></i> All Projects
        </button>
        <button class="filter-btn" data-filter="web-apps">
            <i class="fas fa-globe"></i> Web Apps
        </button>
        <button class="filter-btn" data-filter="python">
            <i class="fab fa-python"></i> Python
        </button>
        <button class="filter-btn" data-filter="desktop">
            <i class="fas fa-desktop"></i> Desktop
        </button>
        <button class="filter-btn" data-filter="extensions">
            <i class="fas fa-puzzle-piece"></i> Extensions
        </button>
        <button class="filter-btn" data-filter="automation">
            <i class="fas fa-robot"></i> Automation
        </button>
        <button class="filter-btn" data-filter="utilities">
            <i class="fas fa-tools"></i> Utilities
        </button>
    </div>

    <!-- Mobile Dropdown Filter -->
    <div class="filter-dropdown-container" id="mobileFilterDropdown">
        <button class="filter-dropdown-btn" id="filterDropdownToggle">
            <span><i class="fas fa-filter"></i> Filter Projects</span>
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="filter-dropdown-menu" id="filterDropdownMenu">
            <button class="filter-option active" data-filter="all">
                <span><i class="fas fa-layer-group"></i> All Projects</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="web-apps">
                <span><i class="fas fa-globe"></i> Web Apps</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="python">
                <span><i class="fab fa-python"></i> Python</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="desktop">
                <span><i class="fas fa-desktop"></i> Desktop</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="extensions">
                <span><i class="fas fa-puzzle-piece"></i> Extensions</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="automation">
                <span><i class="fas fa-robot"></i> Automation</span>
                <span class="filter-count"></span>
            </button>
            <button class="filter-option" data-filter="utilities">
                <span><i class="fas fa-tools"></i> Utilities</span>
                <span class="filter-count"></span>
            </button>
        </div>
    </div>
</div>

                <!-- Projects Grid -->
                <div id="github-projects-grid" class="projects-grid">
                    <div class="loading-projects">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading projects from GitHub...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Floating Backend Demo -->
    <div id="backend-demo-floating"></div>

    <script src="js/main.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/projects-filter.js"></script>
    <script src="js/backend-demo-floating.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, calling renderProjects...');
            if (typeof renderProjects === 'function') {
                renderProjects('github-projects-grid');
            } else {
                console.error('renderProjects function not found');
            }
        });
    </script>
</body>
</html>
